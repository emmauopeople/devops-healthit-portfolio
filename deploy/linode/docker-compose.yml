services:
  portfolio:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    container_name: devops-healthit-portfolio
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
