name: Deploy to Linode

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: linode-production
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}
  LINODE_APP_DIR: /home/mbimunyui/portfolio

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR for push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_BASE_PATH=/
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.LINODE_SSH_KEY }}" > ~/.ssh/linode_deploy_key
          chmod 600 ~/.ssh/linode_deploy_key
          ssh-keyscan -H "${{ secrets.LINODE_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy deployment files to Linode
        run: |
          printf "IMAGE_NAME=%s\nIMAGE_TAG=%s\n" "${IMAGE_NAME}" "${IMAGE_TAG}" > linode.env
          ssh -i ~/.ssh/linode_deploy_key "${{ secrets.LINODE_USER }}@${{ secrets.LINODE_HOST }}" "mkdir -p '${LINODE_APP_DIR}'"
          scp -i ~/.ssh/linode_deploy_key deploy/linode/docker-compose.yml "${{ secrets.LINODE_USER }}@${{ secrets.LINODE_HOST }}:${LINODE_APP_DIR}/docker-compose.yml"
          scp -i ~/.ssh/linode_deploy_key linode.env "${{ secrets.LINODE_USER }}@${{ secrets.LINODE_HOST }}:${LINODE_APP_DIR}/.env"

      - name: Deploy container on Linode
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          ssh -i ~/.ssh/linode_deploy_key "${{ secrets.LINODE_USER }}@${{ secrets.LINODE_HOST }}" "GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN='${GHCR_TOKEN}' LINODE_APP_DIR='${LINODE_APP_DIR}' bash -s" <<'REMOTE'
          set -e
          cd "$LINODE_APP_DIR"
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f
          REMOTE
