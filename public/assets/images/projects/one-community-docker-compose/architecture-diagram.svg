<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">One Community Production Architecture</title>
  <desc id="desc">Architecture diagram for the One Community Docker Compose production deployment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#022c22"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#34d399"/>
    </marker>
    <style>
      .title{font:800 36px Inter,Segoe UI,Arial,sans-serif;fill:#ffffff}
      .subtitle{font:500 18px Inter,Segoe UI,Arial,sans-serif;fill:#cbd5e1}
      .label{font:800 20px Inter,Segoe UI,Arial,sans-serif;fill:#ffffff}
      .small{font:500 15px Inter,Segoe UI,Arial,sans-serif;fill:#cbd5e1}
      .tiny{font:600 13px Inter,Segoe UI,Arial,sans-serif;fill:#94a3b8}
      .box{fill:#0f172a;stroke:#334155;stroke-width:2;rx:22;filter:url(#shadow)}
      .box2{fill:#111827;stroke:#1f2937;stroke-width:2;rx:18}
      .accent{stroke:#34d399;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .muted{stroke:#64748b;stroke-width:2.5;fill:none;marker-end:url(#arrow);stroke-dasharray:8 8}
      .zone{fill:rgba(15,23,42,0.55);stroke:#334155;stroke-width:2;rx:30;stroke-dasharray:10 8}
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="210" cy="120" r="260" fill="#10b981" opacity="0.10"/>
  <circle cx="1320" cy="140" r="300" fill="#38bdf8" opacity="0.10"/>
  <circle cx="1250" cy="850" r="300" fill="#10b981" opacity="0.08"/>

  <text x="80" y="76" class="title">One Community Platform - Production Architecture</text>
  <text x="80" y="112" class="subtitle">Docker Compose deployment with NGINX reverse proxy, HTTPS, PostgreSQL, object storage, monitoring, and backups</text>

  <rect x="58" y="172" width="300" height="560" class="box"/>
  <text x="88" y="220" class="label">Users and Clients</text>
  <rect x="88" y="254" width="240" height="70" class="box2"/>
  <text x="110" y="284" class="small">Public Web Users</text>
  <text x="110" y="308" class="tiny">Browser traffic over HTTPS</text>
  <rect x="88" y="344" width="240" height="70" class="box2"/>
  <text x="110" y="374" class="small">Providers</text>
  <text x="110" y="398" class="tiny">Provider portal and workflows</text>
  <rect x="88" y="434" width="240" height="70" class="box2"/>
  <text x="110" y="464" class="small">Administrators</text>
  <text x="110" y="488" class="tiny">Admin dashboard access</text>
  <rect x="88" y="524" width="240" height="70" class="box2"/>
  <text x="110" y="554" class="small">Mobile Apps</text>
  <text x="110" y="578" class="tiny">Public and provider mobile clients</text>
  <rect x="88" y="614" width="240" height="70" class="box2"/>
  <text x="110" y="644" class="small">Developer Workflow</text>
  <text x="110" y="668" class="tiny">GitHub repositories and CI/CD</text>

  <rect x="430" y="220" width="250" height="170" class="box"/>
  <text x="462" y="268" class="label">DNS and TLS</text>
  <text x="462" y="304" class="small">cameroonskills.org</text>
  <text x="462" y="330" class="small">API domains</text>
  <text x="462" y="356" class="tiny">HTTPS certificates via Certbot</text>

  <rect x="430" y="455" width="250" height="165" class="box"/>
  <text x="462" y="503" class="label">NGINX Reverse Proxy</text>
  <text x="462" y="538" class="small">Routes frontend traffic</text>
  <text x="462" y="564" class="small">Routes backend traffic</text>
  <text x="462" y="590" class="tiny">Public entry point to VPS</text>

  <rect x="750" y="160" width="520" height="610" class="zone"/>
  <text x="785" y="210" class="label">Linux VPS - Docker Compose Network</text>
  <text x="785" y="238" class="tiny">Application containers run behind NGINX; database remains internal</text>

  <rect x="790" y="275" width="190" height="105" class="box2"/>
  <text x="815" y="315" class="small">Public Frontend</text>
  <text x="815" y="340" class="tiny">React / Vite</text>

  <rect x="1030" y="275" width="190" height="105" class="box2"/>
  <text x="1055" y="315" class="small">Backend API</text>
  <text x="1055" y="340" class="tiny">Node.js / Express</text>

  <rect x="790" y="420" width="190" height="105" class="box2"/>
  <text x="815" y="460" class="small">Admin Frontend</text>
  <text x="815" y="485" class="tiny">React Dashboard</text>

  <rect x="1030" y="420" width="190" height="105" class="box2"/>
  <text x="1055" y="460" class="small">Admin API</text>
  <text x="1055" y="485" class="tiny">Admin operations</text>

  <rect x="910" y="570" width="190" height="105" class="box2"/>
  <text x="935" y="610" class="small">PostgreSQL</text>
  <text x="935" y="635" class="tiny">Persistent app data</text>

  <rect x="1160" y="570" width="75" height="105" class="box2"/>
  <text x="1177" y="615" class="small">Logs</text>
  <text x="1177" y="640" class="tiny">App</text>

  <rect x="1340" y="235" width="200" height="160" class="box"/>
  <text x="1368" y="282" class="label">Object Storage</text>
  <text x="1368" y="318" class="small">Skill images</text>
  <text x="1368" y="344" class="small">Media uploads</text>
  <text x="1368" y="370" class="tiny">S3-compatible bucket</text>

  <rect x="1340" y="465" width="200" height="160" class="box"/>
  <text x="1368" y="512" class="label">Backups</text>
  <text x="1368" y="548" class="small">Scheduled pg_dump</text>
  <text x="1368" y="574" class="small">Backup to storage</text>
  <text x="1368" y="600" class="tiny">Restore planning</text>

  <rect x="750" y="820" width="520" height="110" class="box"/>
  <text x="785" y="864" class="label">Monitoring and Reliability</text>
  <text x="785" y="898" class="small">Prometheus collects metrics from backend and cAdvisor; Grafana visualizes CPU, memory, network, requests, and login counters.</text>

  <path d="M358 452 C385 452 400 305 430 305" class="accent"/>
  <path d="M558 390 L558 455" class="accent"/>
  <path d="M680 535 L790 330" class="accent"/>
  <path d="M680 535 L790 475" class="accent"/>
  <path d="M980 328 L1030 328" class="accent"/>
  <path d="M980 473 L1030 473" class="accent"/>
  <path d="M1125 380 L1020 570" class="accent"/>
  <path d="M1125 525 L1040 570" class="accent"/>
  <path d="M1220 328 L1340 315" class="accent"/>
  <path d="M1005 675 L1340 545" class="muted"/>
  <path d="M1005 675 L1005 820" class="muted"/>
  <path d="M1125 525 L1198 570" class="muted"/>

  <rect x="80" y="790" width="1280" height="58" fill="rgba(2,6,23,0.62)" stroke="#334155" stroke-width="1.5" rx="18"/>
  <text x="108" y="825" class="small">Main flow: Users and mobile clients connect over HTTPS to NGINX. NGINX routes frontend and API traffic into Docker Compose services. APIs store data in PostgreSQL, media in object storage, and metrics flow into monitoring.</text>
</svg>
