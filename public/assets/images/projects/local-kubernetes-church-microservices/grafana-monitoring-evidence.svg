<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#0f172a"/>
  <text x="60" y="70" font-family="Arial" font-size="34" font-weight="700" fill="#ffffff">Grafana Monitoring Evidence</text>
  <text x="60" y="108" font-family="Arial" font-size="18" fill="#cbd5e1">Prometheus metrics are visualized for service behavior, resource use, and reliability signals.</text>
  <rect x="70" y="155" width="500" height="170" rx="20" fill="#111827" stroke="#334155"/>
  <text x="105" y="200" font-family="Arial" font-size="22" font-weight="700" fill="#e2e8f0">HTTP Request Rate</text>
  <polyline points="105,275 170,255 235,265 300,245 365,250 430,235 505,240" fill="none" stroke="#22c55e" stroke-width="5"/>
  <text x="105" y="305" font-family="Arial" font-size="15" fill="#94a3b8">Status codes and traffic rate by service</text>
  <rect x="630" y="155" width="500" height="170" rx="20" fill="#111827" stroke="#334155"/>
  <text x="665" y="200" font-family="Arial" font-size="22" font-weight="700" fill="#e2e8f0">HTTP p95 Latency</text>
  <polyline points="665,275 730,270 795,268 860,266 925,269 990,265 1065,263" fill="none" stroke="#60a5fa" stroke-width="5"/>
  <text x="665" y="305" font-family="Arial" font-size="15" fill="#94a3b8">Backend latency remained visible during tests</text>
  <rect x="70" y="365" width="320" height="180" rx="20" fill="#111827" stroke="#334155"/>
  <text x="105" y="410" font-family="Arial" font-size="22" font-weight="700" fill="#e2e8f0">Instances</text>
  <text x="105" y="485" font-family="Arial" font-size="72" font-weight="700" fill="#22c55e">1 1 1</text>
  <text x="105" y="520" font-family="Arial" font-size="15" fill="#94a3b8">auth • core • document</text>
  <rect x="440" y="365" width="320" height="180" rx="20" fill="#111827" stroke="#334155"/>
  <text x="475" y="410" font-family="Arial" font-size="22" font-weight="700" fill="#e2e8f0">Memory / CPU</text>
  <polyline points="475,495 535,470 595,485 655,460 715,475" fill="none" stroke="#f59e0b" stroke-width="5"/>
  <text x="475" y="520" font-family="Arial" font-size="15" fill="#94a3b8">RSS memory and CPU rate</text>
  <rect x="810" y="365" width="320" height="180" rx="20" fill="#111827" stroke="#334155"/>
  <text x="845" y="410" font-family="Arial" font-size="22" font-weight="700" fill="#e2e8f0">Pod Restarts</text>
  <text x="845" y="485" font-family="Arial" font-size="72" font-weight="700" fill="#f43f5e">1</text>
  <text x="845" y="520" font-family="Arial" font-size="15" fill="#94a3b8">restart visibility by pod</text>
  <text x="60" y="620" font-family="Arial" font-size="18" font-weight="700" fill="#ffffff">Operational value: request rate, latency, instances, memory, CPU, and restart panels support production-style troubleshooting.</text>
</svg>
