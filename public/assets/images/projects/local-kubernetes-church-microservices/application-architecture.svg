<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#f8fafc"/>
  <text x="60" y="65" font-family="Arial" font-size="34" font-weight="700" fill="#0f172a">Church Management System — Application Architecture</text>
  <text x="60" y="102" font-family="Arial" font-size="18" fill="#475569">React frontend with Fastify / TypeScript microservices and PostgreSQL-backed domain data stores.</text>
  <rect x="60" y="145" width="1080" height="90" rx="18" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="90" y="180" font-family="Arial" font-size="20" font-weight="700" fill="#075985">Frontend Application</text>
  <text x="90" y="212" font-family="Arial" font-size="16" fill="#0f172a">Login • Dashboard • Members • Sacraments • Certificates • Registers • Documents • Settings</text>
  <rect x="60" y="285" width="320" height="205" rx="20" fill="#fff7ed" stroke="#fb923c"/>
  <text x="90" y="325" font-family="Arial" font-size="21" font-weight="700" fill="#9a3412">auth-service</text>
  <text x="90" y="365" font-family="Arial" font-size="16" fill="#0f172a">Login and current user</text>
  <text x="90" y="395" font-family="Arial" font-size="16" fill="#0f172a">JWT authentication</text>
  <text x="90" y="425" font-family="Arial" font-size="16" fill="#0f172a">Role control</text>
  <rect x="440" y="285" width="320" height="205" rx="20" fill="#ecfdf5" stroke="#22c55e"/>
  <text x="470" y="325" font-family="Arial" font-size="21" font-weight="700" fill="#166534">church-core-service</text>
  <text x="470" y="365" font-family="Arial" font-size="16" fill="#0f172a">Members and parishioners</text>
  <text x="470" y="395" font-family="Arial" font-size="16" fill="#0f172a">Sacraments and member codes</text>
  <text x="470" y="425" font-family="Arial" font-size="16" fill="#0f172a">Church-domain rules</text>
  <rect x="820" y="285" width="320" height="205" rx="20" fill="#f5f3ff" stroke="#8b5cf6"/>
  <text x="850" y="325" font-family="Arial" font-size="21" font-weight="700" fill="#5b21b6">document-service</text>
  <text x="850" y="365" font-family="Arial" font-size="16" fill="#0f172a">Certificate preview/PDF</text>
  <text x="850" y="395" font-family="Arial" font-size="16" fill="#0f172a">File upload and search</text>
  <text x="850" y="425" font-family="Arial" font-size="16" fill="#0f172a">Document download</text>
  <rect x="95" y="545" width="240" height="70" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="125" y="587" font-family="Arial" font-size="17" font-weight="700" fill="#0f172a">auth_db</text>
  <rect x="480" y="545" width="240" height="70" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="510" y="587" font-family="Arial" font-size="17" font-weight="700" fill="#0f172a">church_core_db</text>
  <rect x="860" y="545" width="240" height="70" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="890" y="587" font-family="Arial" font-size="17" font-weight="700" fill="#0f172a">document_core_db</text>
  <text x="60" y="650" font-family="Arial" font-size="15" fill="#64748b">Cross-cutting: health endpoints, database health checks, Prometheus metrics, structured Fastify/Pino logs, JWT auth, and validation.</text>
</svg>
