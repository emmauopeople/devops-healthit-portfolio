<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#f8fafc"/>
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#0f172a">Local Kubernetes Test Infrastructure — Church App</text>
  <text x="60" y="108" font-family="Arial, sans-serif" font-size="18" fill="#475569">App runs locally in Kubernetes; PostgreSQL remains on OVHcloud</text>
  <rect x="60" y="145" width="250" height="170" rx="20" fill="#dbeafe" stroke="#2563eb"/>
  <text x="85" y="185" font-family="Arial" font-size="20" font-weight="700" fill="#1e3a8a">User / Access</text>
  <text x="85" y="225" font-family="Arial" font-size="16" fill="#0f172a">Admin / Tester</text>
  <text x="85" y="255" font-family="Arial" font-size="16" fill="#0f172a">Local PC + VS Code</text>
  <text x="85" y="285" font-family="Arial" font-size="16" fill="#0f172a">localhost / port-forward</text>
  <rect x="360" y="145" width="360" height="170" rx="20" fill="#dcfce7" stroke="#16a34a"/>
  <text x="385" y="185" font-family="Arial" font-size="20" font-weight="700" fill="#166534">Source Control / CI-CD</text>
