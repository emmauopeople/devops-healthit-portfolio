  <text x="385" y="255" font-family="Arial" font-size="16" fill="#0f172a">Build images → Push to ECR</text>
  <text x="385" y="285" font-family="Arial" font-size="16" fill="#0f172a">Update GitOps image tags</text>
  <rect x="770" y="145" width="270" height="170" rx="20" fill="#ffedd5" stroke="#f97316"/>
  <text x="795" y="185" font-family="Arial" font-size="20" font-weight="700" fill="#9a3412">Amazon ECR</text>
  <text x="795" y="225" font-family="Arial" font-size="16" fill="#0f172a">church-frontend</text>
  <text x="795" y="255" font-family="Arial" font-size="16" fill="#0f172a">church-auth-service</text>
  <text x="795" y="285" font-family="Arial" font-size="16" fill="#0f172a">church-core/document</text>
  <rect x="60" y="360" width="850" height="250" rx="24" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="90" y="402" font-family="Arial" font-size="24" font-weight="700" fill="#1e3a8a">Local Kubernetes Cluster (Docker / WSL on Windows PC)</text>
  <rect x="90" y="440" width="160" height="120" rx="16" fill="#ffffff" stroke="#93c5fd"/>
  <text x="115" y="480" font-family="Arial" font-size="17" font-weight="700" fill="#0f172a">argocd</text>
  <text x="115" y="515" font-family="Arial" font-size="15" fill="#334155">Argo CD</text>
  <rect x="285" y="440" width="260" height="120" rx="16" fill="#ffffff" stroke="#93c5fd"/>
  <text x="310" y="480" font-family="Arial" font-size="17" font-weight="700" fill="#0f172a">church-prod</text>
  <text x="310" y="515" font-family="Arial" font-size="15" fill="#334155">frontend, auth, core, document</text>
  <rect x="580" y="440" width="140" height="120" rx="16" fill="#fff7ed" stroke="#fdba74"/>
  <text x="600" y="480" font-family="Arial" font-size="17" font-weight="700" fill="#9a3412">monitoring</text>
  <text x="600" y="515" font-family="Arial" font-size="15" fill="#334155">Prometheus + Grafana</text>
  <rect x="750" y="440" width="130" height="120" rx="16" fill="#f5f3ff" stroke="#c4b5fd"/>
